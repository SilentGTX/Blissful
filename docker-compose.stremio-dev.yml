services:
  stremio-dev:
    image: node:20-alpine
    container_name: stremio-dev
    working_dir: /app
    environment:
      - NODE_ENV=development
      - SERVICE_WORKER_DISABLED=true
      - PNPM_STORE_DIR=/pnpm-store
    volumes:
      - ./apps/stremio-custom:/app
      - stremio_custom_node_modules:/app/node_modules
      - stremio_custom_pnpm_store:/pnpm-store
    command: >
      sh -lc "corepack enable && pnpm i --frozen-lockfile && pnpm start --port 8080"
    ports:
      - "8083:8080"
    networks:
      - web

volumes:
  stremio_custom_node_modules:
  stremio_custom_pnpm_store:
