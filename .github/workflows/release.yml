# Release pipeline for Blissful.
#
# Triggered by pushing a v* tag (e.g. `git tag v0.1.0-beta.1 && git push --tags`)
# or manually via the Actions tab (workflow_dispatch).
#
# Produces a `BlissfulSetup-<version>.exe` Burn-bundled WiX installer and
# attaches it to a *draft* GitHub release. The release is left in draft so
# you can sanity-check before publishing — when you publish, the in-app
# updater (apps/blissful-shell/src/updater.rs) starts notifying users.
#
# -----------------------------------------------------------------------------
# REQUIRED ONE-TIME SETUP (before the first run)
# -----------------------------------------------------------------------------
#
# The shell bundles non-redistributable runtime DLLs (LGPL libmpv + ffmpeg)
# and the Stremio streaming server. These are gitignored — too large for
# git, and the libmpv build needs to be LGPL-compliant (see
# apps/blissful-shell/PREREQUISITES.md section 2). The workflow fetches
# them at build time from URLs you configure as **repository variables**
# under Settings -> Secrets and variables -> Actions -> Variables tab:
#
#   LIBMPV_ZIP_URL          — zip containing libmpv-2.dll + mpv.lib (LGPL build)
#   FFMPEG_ZIP_URL          — zip with av*.dll + sw*.dll + postproc-55.dll
#   STREMIO_SERVICE_ZIP_URL — direct URL to stremio-service.zip
#   VCRUNTIME_ZIP_URL       — zip with msvcp140 + vcruntime140(_1).dll
#
# Plus a matching SHA-256 hash for each (uppercase hex, no separators):
#
#   LIBMPV_ZIP_SHA256
#   FFMPEG_ZIP_SHA256
#   STREMIO_SERVICE_ZIP_SHA256
#   VCRUNTIME_ZIP_SHA256
#
# The hashes are mandatory — without them the workflow refuses to build.
# Compute once on a trusted machine via `Get-FileHash <zip> -Algorithm SHA256`
# (PowerShell) or `sha256sum <zip>` (Linux/macOS) and paste into the repo
# variables UI. Rotate by re-running the hashing step whenever the vendor
# blob changes.
#
# Why mandatory: the URLs live as plain repo variables and resolve over
# plain HTTPS; a hijack of either the variable value or the CDN serving
# the asset would otherwise ship malicious DLLs into every release with
# no in-band signal. Authenticode signing on the final installer
# (SignPath, see below) does not retroactively protect the bundled
# DLLs — the signature covers the outer EXE, not the contents.
#
# Recommended hosting: create a separate "vendor-binaries-v1" tag on this
# repo, upload all four zips as release assets, and reference them by their
# public download URL. The vendor blob then versions independently of the
# app code.
#
# -----------------------------------------------------------------------------
# SIGNPATH SIGNING (enable once SignPath Foundation approves the project)
# -----------------------------------------------------------------------------
#
# The SignPath step at the bottom is commented out. To enable:
#   1. Apply at https://signpath.org/apply (requires the LICENSE file at
#      repo root — already added).
#   2. After approval, generate a CI Submit token in SignPath.
#   3. Add it as repository secret SIGNPATH_API_TOKEN.
#   4. Add your SignPath organization ID as repository variable
#      SIGNPATH_ORGANIZATION_ID.
#   5. Uncomment the "Submit to SignPath" step below and adjust the
#      project/policy/artifact slugs to match what you configured in
#      SignPath's UI.
#
# Until then, releases ship unsigned and users will see the SmartScreen
# "Windows protected your PC" prompt on first install. Document this in
# the release notes so users know to click "More info -> Run anyway".

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from Cargo.toml
        id: version
        shell: pwsh
        run: |
          $line = Select-String -Path 'apps/blissful-shell/Cargo.toml' `
            -Pattern '^version\s*=\s*"([^"]+)"' | Select-Object -First 1
          if (-not $line) { throw 'Could not parse version from Cargo.toml' }
          $ver = $line.Matches.Groups[1].Value
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Building Blissful v$ver"

      - name: Set up Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/blissful-shell

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/blissful-mvs/package-lock.json

      - name: Verify WiX 3.x is on PATH
        shell: pwsh
        run: |
          # windows-latest runners pre-install WiX 3.11 at
          # C:\Program Files (x86)\WiX Toolset v3.11\bin and add it to PATH.
          $wix = Get-Command heat.exe -ErrorAction SilentlyContinue
          if (-not $wix) {
            throw 'heat.exe not on PATH — WiX 3.x missing from runner image'
          }
          heat.exe -? | Select-Object -First 1

      - name: Fetch vendored runtime binaries
        shell: pwsh
        env:
          LIBMPV_ZIP_URL: ${{ vars.LIBMPV_ZIP_URL }}
          FFMPEG_ZIP_URL: ${{ vars.FFMPEG_ZIP_URL }}
          STREMIO_SERVICE_ZIP_URL: ${{ vars.STREMIO_SERVICE_ZIP_URL }}
          VCRUNTIME_ZIP_URL: ${{ vars.VCRUNTIME_ZIP_URL }}
          LIBMPV_ZIP_SHA256: ${{ vars.LIBMPV_ZIP_SHA256 }}
          FFMPEG_ZIP_SHA256: ${{ vars.FFMPEG_ZIP_SHA256 }}
          STREMIO_SERVICE_ZIP_SHA256: ${{ vars.STREMIO_SERVICE_ZIP_SHA256 }}
          VCRUNTIME_ZIP_SHA256: ${{ vars.VCRUNTIME_ZIP_SHA256 }}
        run: |
          $ErrorActionPreference = 'Stop'
          $required = @{
            LIBMPV_ZIP_URL             = $env:LIBMPV_ZIP_URL
            FFMPEG_ZIP_URL             = $env:FFMPEG_ZIP_URL
            STREMIO_SERVICE_ZIP_URL    = $env:STREMIO_SERVICE_ZIP_URL
            VCRUNTIME_ZIP_URL          = $env:VCRUNTIME_ZIP_URL
            LIBMPV_ZIP_SHA256          = $env:LIBMPV_ZIP_SHA256
            FFMPEG_ZIP_SHA256          = $env:FFMPEG_ZIP_SHA256
            STREMIO_SERVICE_ZIP_SHA256 = $env:STREMIO_SERVICE_ZIP_SHA256
            VCRUNTIME_ZIP_SHA256       = $env:VCRUNTIME_ZIP_SHA256
          }
          $missing = $required.GetEnumerator() | Where-Object { -not $_.Value } | ForEach-Object { $_.Key }
          if ($missing) {
            throw "Repository variables not configured: $($missing -join ', '). See workflow header for instructions."
          }

          # Fetch + integrity-check helper. The hash is compared
          # case-insensitively so users can paste either Get-FileHash's
          # uppercase output or sha256sum's lowercase. A mismatch aborts
          # the build before the archive is touched — even Expand-Archive
          # is a parser exposed to attacker-controlled bytes, so we want
          # the gate ahead of every Expand step.
          function Fetch-AndVerify {
            param([string]$Url, [string]$ExpectedSha, [string]$OutFile, [string]$Label)
            Write-Host "--> Fetching $Label..."
            Invoke-WebRequest -Uri $Url -OutFile $OutFile
            $actual = (Get-FileHash $OutFile -Algorithm SHA256).Hash
            if ($actual.ToUpperInvariant() -ne $ExpectedSha.ToUpperInvariant()) {
              throw "$Label SHA-256 mismatch: expected $ExpectedSha, got $actual"
            }
            Write-Host "    $Label SHA-256 verified: $actual"
          }

          $resources = 'apps/blissful-shell/resources'
          New-Item -ItemType Directory -Force -Path "$resources/mpv-x64" | Out-Null
          New-Item -ItemType Directory -Force -Path "$resources/ffmpeg-dlls" | Out-Null
          New-Item -ItemType Directory -Force -Path "$resources/vcruntime" | Out-Null

          Fetch-AndVerify -Url $env:LIBMPV_ZIP_URL -ExpectedSha $env:LIBMPV_ZIP_SHA256 -OutFile libmpv.zip -Label 'libmpv (LGPL build)'
          Expand-Archive -Path libmpv.zip -DestinationPath "$resources/mpv-x64" -Force
          if (-not (Test-Path "$resources/mpv-x64/libmpv-2.dll")) {
            throw 'libmpv-2.dll missing after extraction — wrong zip layout?'
          }

          Fetch-AndVerify -Url $env:FFMPEG_ZIP_URL -ExpectedSha $env:FFMPEG_ZIP_SHA256 -OutFile ffmpeg.zip -Label 'ffmpeg DLLs'
          Expand-Archive -Path ffmpeg.zip -DestinationPath "$resources/ffmpeg-dlls" -Force

          Fetch-AndVerify -Url $env:STREMIO_SERVICE_ZIP_URL -ExpectedSha $env:STREMIO_SERVICE_ZIP_SHA256 -OutFile "$resources/stremio-service.zip" -Label 'stremio-service'
          # No extraction here; the shell extracts at first run from %APPDATA%.

          Fetch-AndVerify -Url $env:VCRUNTIME_ZIP_URL -ExpectedSha $env:VCRUNTIME_ZIP_SHA256 -OutFile vcruntime.zip -Label 'VC++ runtime DLLs'
          Expand-Archive -Path vcruntime.zip -DestinationPath "$resources/vcruntime" -Force

          Remove-Item libmpv.zip, ffmpeg.zip, vcruntime.zip

      - name: Build installer
        shell: pwsh
        working-directory: apps/blissful-shell
        run: ./installer/build.ps1 -SkipSign

      - name: Locate built installer
        id: installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem 'apps/blissful-shell/installer/dist/BlissfulSetup-*.exe' |
                 Select-Object -First 1
          if (-not $exe) { throw 'No installer found in installer/dist/' }
          "path=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "name=$($exe.Name)"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Built: $($exe.FullName) ($([math]::Round($exe.Length/1MB,1)) MB)"

      - name: Compute installer SHA-256 sidecar
        id: installer-sha
        shell: pwsh
        run: |
          # The in-app updater (apps/blissful-shell/src/updater.rs) fetches
          # this sidecar before downloading the installer and refuses to
          # spawn the installer on a SHA mismatch. The sidecar lives next
          # to the installer asset on the GitHub release and follows the
          # `<installer-name>.sha256` convention (single-line: hex hash,
          # space-space, filename — same format as `sha256sum` output).
          $exePath = '${{ steps.installer.outputs.path }}'
          $exeName = '${{ steps.installer.outputs.name }}'
          $hash = (Get-FileHash $exePath -Algorithm SHA256).Hash.ToLowerInvariant()
          $sidecarPath = "$exePath.sha256"
          "$hash  $exeName" | Out-File -FilePath $sidecarPath -Encoding ascii -NoNewline
          "path=$sidecarPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "SHA-256 sidecar: $sidecarPath"
          Write-Host (Get-Content $sidecarPath -Raw)

      - name: Upload unsigned installer artifact
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: BlissfulSetup-${{ steps.version.outputs.version }}-unsigned
          path: ${{ steps.installer.outputs.path }}
          if-no-files-found: error
          retention-days: 30

      # ----------------------------------------------------------------------
      # ENABLE AFTER SIGNPATH APPROVAL — see workflow header for setup steps.
      # ----------------------------------------------------------------------
      # - name: Submit to SignPath for signing
      #   id: signing
      #   uses: signpath/github-action-submit-signing-request@v1
      #   with:
      #     api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
      #     organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
      #     project-slug: blissful
      #     signing-policy-slug: release-signing
      #     artifact-configuration-slug: installer
      #     github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
      #     wait-for-completion: true
      #     output-artifact-directory: signed
      #
      # - name: Locate signed installer
      #   id: signed-installer
      #   shell: pwsh
      #   run: |
      #     $exe = Get-ChildItem 'signed/BlissfulSetup-*.exe' | Select-Object -First 1
      #     "path=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # When signing is enabled, switch the installer path to
          # steps.signed-installer.outputs.path and recompute the .sha256
          # sidecar against the signed file (signing rewrites the EXE).
          files: |
            ${{ steps.installer.outputs.path }}
            ${{ steps.installer-sha.outputs.path }}
          # Every tag is published as a regular (non-prerelease) release
          # and explicitly promoted to "Latest". This is what the in-app
          # updater hits via /releases/latest — without `make_latest`
          # GitHub leaves the prior release flagged Latest and the new
          # build is invisible to the auto-update path until manually
          # un-flagged.
          #
          # We deliberately do NOT auto-flag hyphenated tags
          # (v0.1.0-beta.1, v0.2.0-rc.3) as prereleases the way GitHub's
          # default heuristic suggests — operationally every release in
          # this repo is meant to roll out to existing users, the
          # version suffix is just informational. To intentionally ship
          # a release that does NOT propagate via auto-update, edit it
          # from the GitHub UI after publish and tick "Set as a
          # pre-release".
          prerelease: false
          make_latest: true
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Prune old releases (keep latest 2 + Stable pin)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STABLE_TAG: ${{ vars.STABLE_RELEASE_TAG }}
        run: |
          # Retention policy: after every publish, the GitHub Releases
          # page shows EXACTLY the last 2 Blissful versions plus a
          # manually pinned Stable release. Everything older is deleted.
          #
          # "Blissful release" = tag matches `v<digit>.*`. The unrelated
          # `vendor-binaries-*` releases (libmpv / ffmpeg / etc. payload
          # bundles) are filtered out by that prefix and always preserved.
          #
          # The Stable pin is read from the `STABLE_RELEASE_TAG` repo
          # variable. Empty/unset = no pin (rule degrades to just
          # "latest 2"). The pin is intentionally manual — the choice of
          # which build counts as "known good" is a judgment call, not
          # a derivation, so we don't auto-rotate it.
          $ErrorActionPreference = 'Stop'
          $all = gh release list --repo $env:GITHUB_REPOSITORY --limit 50 `
                   --json tagName,publishedAt,isLatest,isPrerelease |
                 ConvertFrom-Json

          $blissful = $all |
            Where-Object { $_.tagName -match '^v\d' } |
            Sort-Object publishedAt -Descending

          if ($blissful.Count -le 2) {
            Write-Host "Only $($blissful.Count) Blissful release(s) on remote — nothing to prune."
            exit 0
          }

          $keep = [System.Collections.Generic.HashSet[string]]::new()
          # Top 2 by publish date (the new build + the prior one).
          foreach ($r in ($blissful | Select-Object -First 2)) {
            $null = $keep.Add($r.tagName)
          }
          if ($env:STABLE_TAG) {
            $null = $keep.Add($env:STABLE_TAG)
            Write-Host "Stable pin: $env:STABLE_TAG"
          } else {
            Write-Host "STABLE_RELEASE_TAG not set — keeping only latest 2."
          }
          Write-Host ('Keep set: ' + ($keep -join ', '))

          foreach ($r in $blissful) {
            if ($keep.Contains($r.tagName)) {
              Write-Host "  ✓ keep   $($r.tagName)"
              continue
            }
            Write-Host "  ✗ delete $($r.tagName)"
            # Release-only delete; we leave the git tag in place so
            # `git log` / `git tag` history stays intact. Anyone who
            # wants to clean the tags too can run a separate
            # `git push --delete origin <tag>` — intentionally NOT done
            # here because tag removal is essentially irreversible.
            gh release delete $r.tagName --repo $env:GITHUB_REPOSITORY --yes
          }
